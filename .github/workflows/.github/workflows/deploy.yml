name: Deploy CRM to Docker Host

on:
  workflow_run:
    workflows: ["Build and Push CRM Image"]
    types: [completed]

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - name: SSH Deploy
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.DEPLOY_HOST }}
        username: ${{ secrets.DEPLOY_USER }}
        key: ${{ secrets.DEPLOY_SSH_KEY }}
        script: |
          cd /opt/bege-crm
          if [ ! -d repo ]; then
            git clone https://github.com/erbege/bege-crm.git repo
          fi
